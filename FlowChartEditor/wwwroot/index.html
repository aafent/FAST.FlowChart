<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlowChart Editor</title>
    <base href="/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/flowchart-editor.css" />
    <link rel="stylesheet" href="css/app.css" />
</head>
<body>
    <div id="app">
        <div id="fc-loading">
            <div class="fc-splash">
                <div class="fc-splash-icon">
                    <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                        <rect x="4" y="14" width="14" height="12" rx="2" fill="#6366f1"/>
                        <rect x="22" y="4" width="14" height="12" rx="6" fill="#22c55e"/>
                        <rect x="22" y="24" width="14" height="12" rx="6" fill="#ef4444"/>
                    </svg>
                </div>
                <p class="fc-splash-text">Loading…</p>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <!-- All JS interop — loaded BEFORE Blazor so functions are available immediately -->
    <script src="js/app.js"></script>

    <script src="_framework/blazor.webassembly.js"></script>

    <script>
        // Hide loading splash once Blazor renders
        const observer = new MutationObserver(() => {
            const app = document.getElementById('app');
            if (app && app.children.length > 0) {
                const loading = document.getElementById('fc-loading');
                if (loading) {
                    loading.style.opacity = '0';
                    setTimeout(() => loading.style.display = 'none', 200);
                }
                observer.disconnect();
            }
        });
        observer.observe(document.getElementById('app'), { childList: true, subtree: true });
    </script>
</body>
</html>
